<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>404 - Página no encontrada</title>
		<link rel="stylesheet" href="assets/css/styles.css" />
		<style>
			:root {
				--bg: #e5e4e4;
				--text: #333;
				--muted: #666;
				--line: #8f8f8f;
			}

			* {
				box-sizing: border-box;
			}

			html,
			body {
				margin: 0;
				padding: 0;
				min-height: 100%;
				font-family: Arial, sans-serif;
				background: var(--bg);
				color: var(--text);
			}

			.error-page {
				min-height: 100vh;
				display: grid;
				place-items: center;
				padding: 2rem;
			}

			.error-card {
				width: min(680px, 100%);
				border-top: 1px solid var(--line);
				border-bottom: 1px solid var(--line);
				padding: 2rem 0;
			}

			.error-code {
				font-size: 0.9rem;
				font-weight: 700;
				letter-spacing: -0.02em;
				margin: 0 0 0.35rem 0;
			}

			.error-title {
				font-size: 1.4rem;
				line-height: 1.2;
				margin: 0 0 0.8rem 0;
			}

			.error-text {
				margin: 0 0 1.4rem 0;
				color: var(--muted);
				font-size: 0.95rem;
				line-height: 1.5;
			}

			.error-link {
				display: inline-block;
				text-decoration: none;
				color: var(--text);
				border: 1px solid var(--text);
				padding: 0.55rem 0.95rem;
				font-size: 0.82rem;
				letter-spacing: -0.01em;
				transition: background 0.2s ease, color 0.2s ease;
			}

			.error-link:hover {
				background: var(--text);
				color: var(--bg);
			}
		</style>
	</head>
	<body>
		<main class="error-page">
			<section class="error-card" aria-labelledby="error-title">
				<p class="error-code">Error 404</p>
				<h1 class="error-title" id="error-title">La página que buscas no existe</h1>
				<p class="error-text">
					La URL introducida no es válida o el contenido se ha movido.
					Comprueba la dirección o vuelve al inicio.
				</p>
				<a class="error-link" href="index.html">Volver al inicio</a>
			</section>
		</main>
                
                <footer class="site-footer">
                  <div class="footer-line"></div>
                  <div class="footer-content">
                    <div class="footer-left">
                      <span>© 2026 Terranøva Arquitectura</span>
                    </div>
                    <div class="footer-center">
                      <span>A Coruña</span>
                    </div>
                    <div class="footer-right">
                      <span>Todos los derechos reservados</span>
                    </div>
                  </div>
                </footer>
